<div class="auth-page">
  <div class="background-orb orb-1"></div>
  <div class="background-orb orb-2"></div>
  <div class="background-orb orb-3"></div>

  <main class="auth-content">
    <section class="auth-card" aria-labelledby="forgot-title">
      <div class="auth-badge">
        <div class="auth-badge-icon">CX</div>
        <span class="auth-badge-text">Chest X-ray</span>
      </div>

      <h1 id="forgot-title" class="auth-title">Forgot your password?</h1>
      <p class="auth-subtitle">
        Enter the email associated with your account and we will send you a secure link to reset
        your password.
      </p>

      <form class="auth-form" novalidate>
        <div class="form-group">
          <label for="forgot-email">Email address</label>
          <input
            id="forgot-email"
            type="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <button type="submit" class="btn primary">Send reset link</button>
      </form>

      <p class="auth-footer">
        Remember your password?
        <a routerLink="/login" class="link">Back to login</a>
      </p>
    </section>
  </main>
</div>
